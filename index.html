<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Frontend</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <header>
        <!-- Logo -->
        <div class="logo">
            <img src="assets/logo.png" alt="Radianté Logo">
            <h1>Radianté</h1>
        </div>

        <!-- Navigation Menu -->
        <nav class="nav-menu">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Products</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>

        <!-- Search Bar -->
        <div class="search-bar">
            <span class="search-icon">
                <i class="fa-solid fa-magnifying-glass"></i>
            </span>
            <input type="text" placeholder="Search for products...">
        </div>

        <!-- Cart Icon -->
        <div class="cart">
            🛒
            <span>0</span>
        </div>

        <!-- Hamburger Menu for Mobile -->
        <div class="hamburger-menu">
            ☰
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Enhance Your Beauty with Radianté</h1>

            <p>
                From flawless makeup to premium beauty products, Radianté brings elegance to your daily routine.
            </p>

            <a href="#" class="btn">Explore</a>
        </div>
    </section>

    <!-- Products Section -->
    <section id="products" class="products-section">
        <h2>Beauty Essentials by Radianté</h2>
        
        <!-- Product Grid -->
        <div class="product-grid" id="product-grid">
           
            <!-- Product cards will be dynamically inserted here -->

        </div>
    </section>

    <script src="scripts/app.js"></script>
    
</body>    
</html>
